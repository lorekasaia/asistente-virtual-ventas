<!DOCTYPE html>
<html>
<head>
    <title>Batia AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #0c6a8a; color: white; padding: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #e0f7fa; padding: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: bailar 3s infinite ease-in-out; }
        @keyframes bailar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-8deg); }
            50% { transform: translateY(-8px) rotate(0deg); }
            75% { transform: translateY(-5px) rotate(8deg); }
        }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .user { align-self: flex-end; background: #118AB2; color: white; }
        .bot { align-self: flex-start; background: white; border: 1px solid #ddd; color: #333; }
        #input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #06D6A0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <img src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23e1f5fe'/%3E%3Cline x1='50' y1='25' x2='50' y2='10' stroke='%230277bd' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='10' r='4' fill='%23ffca28'/%3E%3Crect x='25' y='25' width='50' height='40' rx='15' fill='%2329b6f6'/%3E%3Crect x='18' y='35' width='7' height='20' rx='3' fill='%230288d1'/%3E%3Crect x='75' y='35' width='7' height='20' rx='3' fill='%230288d1'/%3E%3Crect x='30' y='30' width='40' height='30' rx='10' fill='%23ffffff'/%3E%3Ccircle cx='40' cy='42' r='4' fill='%230277bd'/%3E%3Ccircle cx='60' cy='42' r='4' fill='%230277bd'/%3E%3Ccircle cx='35' cy='50' r='3' fill='%23f48fb1' opacity='0.7'/%3E%3Ccircle cx='65' cy='50' r='3' fill='%23f48fb1' opacity='0.7'/%3E%3Cpath d='M45 52 Q50 56 55 52' stroke='%230277bd' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" alt="Robot Asistente" class="avatar">
        <h2 style="margin: 0;"> Mi asistente virtual | Grupo Batia</h2>
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Pregunta sobre los clientes de datosdeprueba...">
        <button onclick="sendMsg()">Enviar</button>
    </div>
    <script>
        async function sendMsg() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value.trim();
            if(!prompt) return;

            chatBox.innerHTML += `<div class="msg user">${prompt}</div>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                const data = await response.json();
                const reply = data.respuesta || data.error;
                chatBox.innerHTML += `<div class="msg bot">${reply.replace(/\\n/g, '<br>')}</div>`;
            } catch(e) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
