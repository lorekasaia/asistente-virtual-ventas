<!DOCTYPE html>
<html>
<head>
    <title>Batia AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #073B4C; color: white; padding: 15px; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .user { align-self: flex-end; background: #118AB2; color: white; }
        .bot { align-self: flex-start; background: white; border: 1px solid #ddd; color: #333; }
        #input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #06D6A0; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header"><h2>Panel de Control Comercial | Grupo Batia</h2></div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Pregunta sobre los clientes de datosdeprueba...">
        <button onclick="sendMsg()">Enviar</button>
    </div>
    <script>
        async function sendMsg() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value.trim();
            if(!prompt) return;

            chatBox.innerHTML += `<div class="msg user">${prompt}</div>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                const data = await response.json();
                const reply = data.respuesta || data.error;
                chatBox.innerHTML += `<div class="msg bot">${reply.replace(/\\n/g, '<br>')}</div>`;
            } catch(e) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">Error de conexión.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
